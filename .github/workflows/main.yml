name: Build and Push Native Image of SDIS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest 
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Native Image with Paketo
        run: |
          ./mvnw clean spring-boot:build-image \
            -Dspring-boot.build-image.imageName=ghcr.io/selfiekonrad/native-image-resizer:latest

      - name: Push Image to GHCR
        run: docker push ghcr.io/selfiekonrad/native-image-resizer:latest
